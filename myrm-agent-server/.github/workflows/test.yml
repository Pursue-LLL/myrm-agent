name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Linux 环境测试（包括 IPC 模式）
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Fractal docs gate
        run: |
          uv run python scripts/check_fractal_docs.py

      - name: Run unit tests
        run: |
          uv run pytest tests/unit/ -v --tb=short

      - name: Run IPC tests (Linux specific)
        run: |
          uv run pytest tests/unit/test_mcp_ipc.py -v --tb=short

  # macOS 环境测试（HTTP 模式）
  test-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Fractal docs gate
        run: |
          uv run python scripts/check_fractal_docs.py

      - name: Run unit tests
        run: |
          uv run pytest tests/unit/ -v --tb=short

  # API 测试（仅 Linux，需要 Docker）
  test-api:
    runs-on: ubuntu-latest
    needs: [test-linux]
    strategy:
      matrix:
        python-version: ["3.13"]

    services:
      docker:
        image: docker:dind
        options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Build Docker sandbox image
        run: |
          cd docker/sandbox && docker build -t open-perplexity/skill-sandbox:latest -f Dockerfile .
        continue-on-error: true

      - name: Startup Performance Test
        run: |
          echo "Starting server in background..."
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          SERVER_PID=$!
          
          echo "Waiting for server to be ready..."
          START_TIME=$(date +%s%3N)
          
          for i in {1..50}; do
            if curl -s http://127.0.0.1:8000/health > /dev/null 2>&1; then
              END_TIME=$(date +%s%3N)
              STARTUP_TIME=$((END_TIME - START_TIME))
              echo "✅ Server ready in ${STARTUP_TIME}ms"
              
              if [ $STARTUP_TIME -gt 2500 ]; then
                echo "::error::Startup time ${STARTUP_TIME}ms exceeds threshold 2500ms"
                kill $SERVER_PID
                exit 1
              fi
              
              kill $SERVER_PID
              exit 0
            fi
            sleep 0.2
          done
          
          echo "::error::Server failed to start within 10 seconds"
          kill $SERVER_PID
          exit 1
        env:
          DEPLOY_MODE: local
      
      - name: Run API tests
        run: |
          uv run pytest tests/api/ -v --tb=short -k "not docker_mcp"
        env:
          DEPLOY_MODE: local
































