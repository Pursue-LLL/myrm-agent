# MyrmAgent Docker Compose
# 
# 部署模式（推荐使用 deploy.py）:
#   uv run deploy.py docker             # Docker 全栈部署（本地模式，SQLite）
#   uv run deploy.py sandbox             # Sandbox 沙箱模式
#
# 手动 Docker Compose 命令:
#   全栈部署（推荐）:   docker compose --profile app up -d
#   Sandbox 依赖服务:    docker compose --profile storage up -d
#   + SearXNG:          docker compose --profile search --profile storage up -d
#
# 其他操作:
#   停止所有服务:       docker compose down
#   查看日志:           docker compose logs -f
#   清理数据:           docker compose down -v
#
# Profile 服务:
#   - app:     后端 + 前端应用（Docker 全栈部署，使用 SQLite，无外部数据库依赖）
#   - db:      PostgreSQL + AGE（可选图查询扩展）
#   - search:  SearXNG 搜索服务（Self-hosted 模式专用）
#   - storage: MinIO 对象存储（Sandbox 模式需要）

services:

  # ==========================================================================
  # Application Services (Docker 全栈部署)
  # 启动命令: docker compose --profile app up -d
  # 使用 SQLite + Qdrant Embedded，无需外部数据库
  # ==========================================================================

  # Backend - Python FastAPI 后端
  backend:
    container_name: myrm-backend
    profiles:
      - app
    build:
      context: ..
      dockerfile: myrm-agent-server/Dockerfile
    restart: unless-stopped
    networks:
      - myrm
    ports:
      - "25808:25808"
    environment:
      DEPLOY_MODE: local
      PORT: "25808"
      HOST: "0.0.0.0"
    env_file:
      - path: .env
        required: false
    volumes:
      - backend-data:/home/myrm/.myrm-agent
      - ${MYRM_WORKSPACE:-./workspace}:/home/myrm/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:25808/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend - Next.js 前端
  frontend:
    container_name: myrm-frontend
    profiles:
      - app
    build:
      context: ..
      dockerfile: myrm-agent-frontend/Dockerfile
      args:
        API_HOST: backend
        API_PORT: "25808"
    restart: unless-stopped
    networks:
      - myrm
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================================================
  # Agent Sandbox Image (Sandbox 模式专用)
  # 启动命令: docker compose --profile sandbox build agent-image
  # Agent-in-Sandbox 架构：预构建包含 harness + browser + tools 的 Agent 镜像
  # ==========================================================================

  agent-image:
    container_name: myrm-agent-image
    profiles:
      - sandbox
    build:
      context: ..
      dockerfile: myrm-agent-harness/Dockerfile
      # Full-stack image build only: pass control-service sources via MYRM_CP_BUILD_CONTEXT
      additional_contexts:
        control-plane: ${MYRM_CP_BUILD_CONTEXT:-}
    image: myrm-agent:latest
    command: ["echo", "Agent image built successfully"]

  # ==========================================================================
  # Database Services (可选扩展)
  # PostgreSQL + AGE 仅用于图查询扩展（需设置 DATABASE_URL 环境变量）
  # 所有模式默认使用 SQLite + 嵌入式 Qdrant，无需此服务
  # 启动命令: docker compose --profile db up -d
  # ==========================================================================

  # PostgreSQL + Apache AGE - 图查询扩展（可选）
  postgres:
    container_name: postgres
    image: apache/age:latest
    profiles:
      - db
    restart: unless-stopped
    networks:
      - myrm
    ports:
      - "5432:5432"
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=age"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
    environment:
      POSTGRES_USER: myrmagent
      POSTGRES_PASSWORD: myrmagent
      POSTGRES_DB: myrmagent
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-age.sql:/docker-entrypoint-initdb.d/01-init-age.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myrmagent"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================================================
  # Search Service (Self-hosted 专用)
  # 启动命令: docker compose --profile search up -d
  # ==========================================================================

  # SearXNG - 元搜索引擎
  searxng:
    container_name: searxng
    image: docker.m.daocloud.io/searxng/searxng:latest
    restart: unless-stopped
    profiles:
      - search
    networks:
      - myrm
    ports:
      - "8081:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=https://${SEARXNG_HOSTNAME:-localhost}/
      - UWSGI_WORKERS=${SEARXNG_UWSGI_WORKERS:-4}
      - UWSGI_THREADS=${SEARXNG_UWSGI_THREADS:-4}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  # ==========================================================================
  # Storage Service (Sandbox 必需)
  # 启动命令: docker compose --profile storage up -d
  # ==========================================================================

  # MinIO - 对象存储 (文件、技能资产)
  minio:
    container_name: minio
    image: minio/minio:latest
    restart: unless-stopped
    profiles:
      - storage
    networks:
      - myrm
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  myrm:

volumes:
  postgres-data:
  minio-data:
  backend-data:
