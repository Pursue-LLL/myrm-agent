name: Frontend build

on:
  pull_request:
    paths:
      - 'myrm-agent-frontend/**'
      - 'shared/**'
      - '.github/workflows/frontend-build.yml'
  push:
    branches:
      - main
    paths:
      - 'myrm-agent-frontend/**'
      - 'shared/**'
      - '.github/workflows/frontend-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: myrm-agent-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Vitest (shared provider remap contract)
        run: bunx vitest run src/store/config/__tests__/providerIdentityMigration.test.ts
      - name: Next.js build (module graph)
        run: bunx next build
