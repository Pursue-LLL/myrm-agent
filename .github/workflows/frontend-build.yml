name: Frontend build

on:
  pull_request:
    paths:
      - 'myrm-agent-frontend/**'
      - 'shared/**'
      - '.github/workflows/frontend-build.yml'

concurrency:
  group: frontend-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: myrm-agent-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lockfile policy (bun SSOT, no package-lock.json)
        run: test ! -f package-lock.json
      - name: Frontend line budget (no new >400-line modules)
        run: python3 scripts/check_file_line_budget.py
      - name: TypeScript strict (no error count regression)
        run: python3 scripts/check_typescript_strict.py
      - name: Fractal docs (strict roots + recursive baseline)
        run: python3 scripts/check_fractal_docs.py --no-stub
      - name: Barrel export policy (cross-domain index.ts whitelist)
        run: python3 scripts/check_barrel_exports.py
      - name: i18n completeness (verify:i18n)
        run: bun run verify:i18n
      - name: Vitest (shared provider remap contract)
        run: bunx vitest run src/store/config/__tests__/providerIdentityMigration.test.ts
      - name: Next.js build (module graph)
        run: bun run build
      - name: Service worker Web Push handlers
        run: node scripts/verify-sw-push.mjs
