name: Server unit tests

on:
  pull_request:
    paths:
      - 'myrm-agent-server/**'
      - 'shared/**'
      - '.github/workflows/server-unit-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'myrm-agent-server/**'
      - 'shared/**'
      - '.github/workflows/server-unit-tests.yml'

concurrency:
  group: server-unit-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  default-pytest:
    name: Default pytest (-m not e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: myrm-agent-server
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Run default pytest suite
        run: bash scripts/ci/run_default_tests.sh
