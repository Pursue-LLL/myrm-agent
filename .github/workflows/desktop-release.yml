name: Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-arm:
    name: Build macOS Apple Silicon (primary)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Inject version from tag
        run: bash scripts/ci/desktop-release/inject-version.sh "${{ github.ref_name }}"

      - name: Set TARGET_ARCH for Sidecar Build
        run: echo "TARGET_ARCH=arm64" >> $GITHUB_ENV

      - name: Sync server venv (desktop production)
        env:
          MYRM_HARNESS_INSTALL_MODE: pypi
        run: bash scripts/ci/desktop-release/sync-server-venv.sh

      - name: Build Sidecars
        run: |
          cd myrm-agent-desktop/sidecar
          python build.py

      - name: Install frontend dependencies
        run: |
          cd myrm-agent-frontend
          bun install

      - name: Build frontend for Tauri
        run: |
          cd myrm-agent-frontend
          bun run build:tauri

      - name: Download cloudflared (aarch64)
        run: bash scripts/ci/desktop-release/download-cloudflared-for-target.sh aarch64-apple-darwin

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        with:
          projectPath: myrm-agent-desktop
          args: --target aarch64-apple-darwin --no-sign

      - name: Upload macOS ARM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-macos-apple-silicon
          path: |
            myrm-agent-desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
            myrm-agent-desktop/src-tauri/target/**/release/bundle/macos/*.tar.gz
            myrm-agent-desktop/src-tauri/target/**/*.sig
          retention-days: 1

  publish-release:
    name: Publish GitHub Release (macOS ARM)
    needs: build-macos-arm
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.build-macos-arm.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS ARM artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-macos-apple-silicon
          path: artifacts

      - name: Flatten release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.dmg" -o -name "*.tar.gz" -o -name "*.sig" \) -exec cp {} release-assets/ \;

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true

  build-extra-platforms:
    name: Build ${{ matrix.platform }}
    needs: publish-release
    if: needs.publish-release.result == 'success'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            target_arch: x86_64
            cloudflared_target: x86_64-pc-windows-msvc
            tauri_args: ''
          - platform: linux
            runner: ubuntu-22.04
            target_arch: x86_64
            cloudflared_target: x86_64-unknown-linux-gnu
            tauri_args: ''

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux only)
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            build-essential curl wget file libssl-dev

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Inject version from tag
        run: bash scripts/ci/desktop-release/inject-version.sh "${{ github.ref_name }}"
        shell: bash

      - name: Set TARGET_ARCH for Sidecar Build
        run: echo "TARGET_ARCH=${{ matrix.target_arch }}" >> $GITHUB_ENV
        shell: bash

      - name: Sync server venv (desktop production)
        env:
          MYRM_HARNESS_INSTALL_MODE: pypi
        run: bash scripts/ci/desktop-release/sync-server-venv.sh
        shell: bash

      - name: Build Sidecars
        run: |
          cd myrm-agent-desktop/sidecar
          python build.py
        shell: bash

      - name: Install frontend dependencies
        run: |
          cd myrm-agent-frontend
          bun install
        shell: bash

      - name: Build frontend for Tauri
        run: |
          cd myrm-agent-frontend
          bun run build:tauri
        shell: bash

      - name: Download cloudflared (${{ matrix.platform }})
        run: bash scripts/ci/desktop-release/download-cloudflared-for-target.sh "${{ matrix.cloudflared_target }}"
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        with:
          projectPath: myrm-agent-desktop
          args: ${{ matrix.tauri_args }}

      - name: Upload assets to existing GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s globstar nullglob
          files=(myrm-agent-desktop/src-tauri/target/**/release/bundle/**/*.dmg
                 myrm-agent-desktop/src-tauri/target/**/release/bundle/**/*.exe
                 myrm-agent-desktop/src-tauri/target/**/release/bundle/**/*.msi
                 myrm-agent-desktop/src-tauri/target/**/release/bundle/**/*.AppImage
                 myrm-agent-desktop/src-tauri/target/**/release/bundle/**/*.deb
                 myrm-agent-desktop/src-tauri/target/**/release/bundle/**/*.tar.gz)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets found for ${{ matrix.platform }}"
            exit 1
          fi
          gh release upload "${{ github.ref_name }}" "${files[@]}" --clobber
        shell: bash

  finalize-release:
    name: Finalize manifest (latest.json + sha256)
    needs:
      - publish-release
      - build-extra-platforms
    if: always() && needs.publish-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate and upload latest.json + checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: bash scripts/ci/desktop-release/finalize-release.sh

      - name: Trigger marketing site deploy (website-v* tag + CF hook)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          DESKTOP_TAG: ${{ github.ref_name }}
          BRAND_RELEASE_PAT: ${{ secrets.BRAND_RELEASE_PAT }}
          CF_PAGES_DEPLOY_HOOK: ${{ secrets.CF_PAGES_DEPLOY_HOOK }}
        run: bash scripts/ci/desktop-release/trigger-website-release.sh
