name: Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    name: Build on ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-apple-silicon
            runner: macos-14
            target_arch: arm64
          - platform: macos-intel
            runner: macos-13
            target_arch: x86_64
          - platform: windows
            runner: windows-latest
            target_arch: x86_64
          - platform: linux
            runner: ubuntu-22.04
            target_arch: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux only)
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-apple-silicon' && 'aarch64-apple-darwin' || matrix.platform == 'macos-intel' && 'x86_64-apple-darwin' || '' }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set TARGET_ARCH for Sidecar Build
        run: echo "TARGET_ARCH=${{ matrix.target_arch }}" >> $GITHUB_ENV
        shell: bash

      - name: Build Sidecars
        env:
          MYRM_HARNESS_INSTALL_MODE: pypi
        run: |
          cd myrm-agent-server
          uv sync --frozen --all-extras --group dev --no-extra matrix-e2ee
          uv pip install pyinstaller
          cd ../myrm-agent-desktop/sidecar
          python build.py
        shell: bash

      - name: Install frontend dependencies
        run: |
          cd myrm-agent-frontend
          bun install

      - name: Build frontend for Tauri
        run: |
          cd myrm-agent-frontend
          bun run build:tauri
        shell: bash

      - name: Download cloudflared sidecar binaries
        run: bash myrm-agent-desktop/scripts/download-cloudflared.sh
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        with:
          projectPath: myrm-agent-desktop
          args: ${{ matrix.platform == 'macos-apple-silicon' && '--target aarch64-apple-darwin' || matrix.platform == 'macos-intel' && '--target x86_64-apple-darwin' || '' }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform }}
          path: |
            myrm-agent-desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
            myrm-agent-desktop/src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            myrm-agent-desktop/src-tauri/target/**/release/bundle/msi/*.msi
            myrm-agent-desktop/src-tauri/target/**/release/bundle/nsis/*.exe
            myrm-agent-desktop/src-tauri/target/**/release/bundle/appimage/*.AppImage
            myrm-agent-desktop/src-tauri/target/**/release/bundle/deb/*.deb
            myrm-agent-desktop/src-tauri/target/**/*.sig
          retention-days: 1

      - name: Upload latest.json
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.platform }}
          path: myrm-agent-desktop/src-tauri/target/**/release/bundle/macos/latest.json
          retention-days: 1
        if: matrix.platform == 'macos-apple-silicon' || matrix.platform == 'macos-intel'
        continue-on-error: true

      - name: Upload latest.json (Windows/Linux)
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.platform }}
          path: |
            myrm-agent-desktop/src-tauri/target/**/release/bundle/msi/latest.json
            myrm-agent-desktop/src-tauri/target/**/release/bundle/nsis/latest.json
            myrm-agent-desktop/src-tauri/target/**/release/bundle/appimage/latest.json
          retention-days: 1
        if: matrix.platform == 'windows' || matrix.platform == 'linux'
        continue-on-error: true

  publish-release:
    name: Publish Release and Merge Updater
    needs: build-tauri
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge latest.json
        run: |
          python3 -c "
          import json, os, glob

          master_latest = {}
          for f in glob.glob('artifacts/**/latest.json', recursive=True):
              try:
                  with open(f, 'r') as file:
                      data = json.load(file)
                      if not master_latest:
                          master_latest = data
                      else:
                          if 'platforms' in data:
                              if 'platforms' not in master_latest:
                                  master_latest['platforms'] = {}
                              master_latest['platforms'].update(data['platforms'])
              except Exception as e:
                  print(f'Error reading {f}: {e}')

          if master_latest:
              with open('artifacts/latest.json', 'w') as out:
                  json.dump(master_latest, out, indent=2)
              print('Merged latest.json successfully.')
          else:
              print('No latest.json found to merge.')
          "

      - name: Flatten Artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.tar.gz" -o -name "*.sig" \) -exec cp {} release-assets/ \;
          if [ -f artifacts/latest.json ]; then
            cp artifacts/latest.json release-assets/
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
