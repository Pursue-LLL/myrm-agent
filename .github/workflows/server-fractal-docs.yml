name: Server fractal docs

on:
  push:
    paths:
      - 'myrm-agent-server/app/**'
      - 'myrm-agent-server/scripts/check_fractal_docs.py'
      - 'myrm-agent-server/scripts/sync_arch_file_tables.py'
      - '.github/workflows/server-fractal-docs.yml'
  pull_request:
    paths:
      - 'myrm-agent-server/app/**'
      - 'myrm-agent-server/scripts/check_fractal_docs.py'
      - 'myrm-agent-server/scripts/sync_arch_file_tables.py'
      - '.github/workflows/server-fractal-docs.yml'

jobs:
  fractal-arch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: myrm-agent-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Fractal docs gates (directory + strict headers baseline)
        run: |
          python3 scripts/check_fractal_docs.py
          python3 scripts/check_fractal_docs.py \
            --strict-headers \
            --header-baseline tests/architecture/data/fractal_header_baseline.txt
